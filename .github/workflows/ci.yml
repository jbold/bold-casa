name: CI

on:
  push:
    branches:
      - main
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Zola
        uses: taiki-e/install-action@v2
        with:
          tool: zola

      - name: Install Rust
        if: hashFiles('transition-wasm/Cargo.toml') != ''
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm

      - name: Install QA dependencies
        run: npm ci

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Site build and structural checks
        run: ./scripts/test.sh | tee /tmp/site-checks.log

      - name: Rust unit tests
        if: hashFiles('transition-wasm/Cargo.toml') != ''
        run: cargo test --locked --manifest-path transition-wasm/Cargo.toml

      - name: Rust unit tests skipped
        if: hashFiles('transition-wasm/Cargo.toml') == ''
        run: |
          {
            echo "## Rust Tests"
            echo ""
            echo "- Skipped: \`transition-wasm/Cargo.toml\` not found in this branch."
          } >> "${GITHUB_STEP_SUMMARY}"

      - name: E2E + accessibility smoke tests
        run: ./scripts/test-e2e-a11y.sh

      - name: Summarize E2E report
        if: always() && hashFiles('test-results/e2e/report.json') != ''
        run: |
          node - <<'EOF'
          const fs = require("node:fs");
          const report = JSON.parse(fs.readFileSync("test-results/e2e/report.json", "utf8"));
          const routeTotal = report.checks.length;
          const routeFailed = report.checks.filter((check) => !check.ok).length;
          const flowTotal = report.flowChecks.length;
          const flowFailed = report.flowChecks.filter((check) => !check.ok).length;
          const totalSerious = report.checks.reduce((sum, check) => {
            return sum + (check.a11ySummary ? check.a11ySummary.seriousViolations : 0);
          }, 0);
          const totalCritical = report.checks.reduce((sum, check) => {
            return sum + (check.a11ySummary ? check.a11ySummary.criticalViolations : 0);
          }, 0);

          const lines = [
            "## E2E + Accessibility",
            "",
            `- Route checks: ${routeTotal - routeFailed}/${routeTotal} passed`,
            `- Flow checks: ${flowTotal - flowFailed}/${flowTotal} passed`,
            `- Total serious accessibility violations (observed): ${totalSerious}`,
            `- Total critical accessibility violations (observed): ${totalCritical}`,
          ];
          fs.appendFileSync(process.env.GITHUB_STEP_SUMMARY, `${lines.join("\n")}\n`);
          EOF

      - name: Upload E2E artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-a11y-report
          path: |
            test-results/e2e/
            /tmp/site-checks.log
            /tmp/zola-e2e.log
