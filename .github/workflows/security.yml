name: Security

on:
  pull_request:
  push:
    branches:
      - main
  schedule:
    - cron: "17 5 * * 1"
  workflow_dispatch:

jobs:
  detect-rust-module:
    runs-on: ubuntu-latest
    outputs:
      has_rust: ${{ steps.detect.outputs.has_rust }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Detect optional Rust module
        id: detect
        run: |
          if [[ -f "transition-wasm/Cargo.toml" ]]; then
            echo "has_rust=true" >> "${GITHUB_OUTPUT}"
          else
            echo "has_rust=false" >> "${GITHUB_OUTPUT}"
          fi

  dependency-review:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Dependency review
        uses: actions/dependency-review-action@v4

  gitleaks:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Secret scan
        uses: gitleaks/gitleaks-action@v2
        with:
          args: --report-format sarif --report-path gitleaks.sarif
      - name: Upload gitleaks SARIF
        if: always() && hashFiles('gitleaks.sarif') != ''
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: gitleaks.sarif
      - name: Upload gitleaks artifact
        if: always() && hashFiles('gitleaks.sarif') != ''
        uses: actions/upload-artifact@v4
        with:
          name: gitleaks-sarif
          path: gitleaks.sarif

  codeql-javascript:
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Initialize CodeQL (JavaScript)
        uses: github/codeql-action/init@v3
        with:
          languages: javascript

      - name: Autobuild
        uses: github/codeql-action/autobuild@v3

      - name: Analyze
        uses: github/codeql-action/analyze@v3

  codeql-rust:
    needs: detect-rust-module
    if: needs.detect-rust-module.outputs.has_rust == 'true'
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Initialize CodeQL (Rust)
        uses: github/codeql-action/init@v3
        with:
          languages: rust

      - name: Autobuild
        uses: github/codeql-action/autobuild@v3

      - name: Analyze
        uses: github/codeql-action/analyze@v3

  cargo-audit:
    needs: detect-rust-module
    runs-on: ubuntu-latest
    if: (github.event_name == 'schedule' || github.event_name == 'workflow_dispatch') && needs.detect-rust-module.outputs.has_rust == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Install cargo-audit
        run: cargo install cargo-audit --locked
      - name: Run cargo audit
        run: cargo audit --json --manifest-path transition-wasm/Cargo.toml > cargo-audit.json
      - name: Upload cargo-audit artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cargo-audit-report
          path: cargo-audit.json
