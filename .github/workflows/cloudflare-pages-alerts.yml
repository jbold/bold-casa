name: Cloudflare Pages Alerts

on:
  check_run:
    types:
      - completed

permissions:
  contents: read
  issues: write

jobs:
  alert-on-cloudflare-pages-failure:
    if: ${{ github.event.check_run.name == 'Cloudflare Pages' && github.event.check_run.conclusion != 'success' }}
    runs-on: ubuntu-latest
    steps:
      - name: Create issue for failed Cloudflare deploy check
        uses: actions/github-script@v7
        with:
          script: |
            const checkRun = context.payload.check_run;
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const marker = `ops-cloudflare-check-run-id:${checkRun.id}`;

            const existing = await github.rest.search.issuesAndPullRequests({
              q: `repo:${owner}/${repo} type:issue in:body "${marker}" state:open`,
              per_page: 5,
            });

            if (existing.data.items.length > 0) {
              console.log(`Open issue already exists for Cloudflare check run ${checkRun.id}`);
              return;
            }

            const title = `[ops] Cloudflare Pages deployment failed (check ${checkRun.id})`;
            const body = [
              "Automated deployment alert from GitHub check-runs.",
              "",
              `- Check name: ${checkRun.name}`,
              `- Conclusion: ${checkRun.conclusion}`,
              `- Branch: ${checkRun.check_suite?.head_branch || "unknown"}`,
              `- Commit: ${checkRun.head_sha}`,
              `- Triggered by app: ${checkRun.app?.slug || "unknown"}`,
              `- Details URL: ${checkRun.details_url || "n/a"}`,
              "",
              "This monitors native Cloudflare GitHub integration check-runs.",
              "",
              marker,
            ].join("\n");

            await github.rest.issues.create({
              owner,
              repo,
              title,
              body,
            });
