name: Cloudflare Pages Alerts

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  monitor-cloudflare-pages-check:
    runs-on: ubuntu-latest
    steps:
      - name: Wait for Cloudflare Pages check-run
        id: cloudflare
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const ref = context.sha;
            const appSlug = "cloudflare-workers-and-pages";
            const checkName = "Cloudflare Pages";
            const maxAttempts = 60;
            const delayMs = 10000;

            let found = null;

            for (let attempt = 1; attempt <= maxAttempts; attempt += 1) {
              const response = await github.rest.checks.listForRef({
                owner,
                repo,
                ref,
                per_page: 100,
              });

              found = response.data.check_runs.find((run) => {
                return run.name === checkName && run.app?.slug === appSlug;
              });

              if (found && found.status === "completed") {
                break;
              }

              await new Promise((resolve) => setTimeout(resolve, delayMs));
            }

            if (!found) {
              core.setOutput("status", "missing");
              core.setOutput("conclusion", "missing");
              core.setOutput("check_run_id", "none");
              core.setOutput("details_url", "");
              core.setFailed("Cloudflare Pages check-run not found for this commit.");
              return;
            }

            core.setOutput("status", found.status || "unknown");
            core.setOutput("conclusion", found.conclusion || "unknown");
            core.setOutput("check_run_id", String(found.id));
            core.setOutput("details_url", found.details_url || "");

            if (found.conclusion !== "success") {
              core.setFailed(`Cloudflare Pages check concluded with '${found.conclusion}'.`);
            }

      - name: Create issue for failed Cloudflare Pages deploy
        if: failure()
        uses: actions/github-script@v7
        env:
          CHECK_RUN_ID: ${{ steps.cloudflare.outputs.check_run_id }}
          CONCLUSION: ${{ steps.cloudflare.outputs.conclusion }}
          DETAILS_URL: ${{ steps.cloudflare.outputs.details_url }}
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const marker = `ops-cloudflare-monitor-sha:${context.sha}`;
            const checkRunId = process.env.CHECK_RUN_ID || "none";
            const conclusion = process.env.CONCLUSION || "unknown";
            const detailsUrl = process.env.DETAILS_URL || "n/a";

            const existing = await github.rest.search.issuesAndPullRequests({
              q: `repo:${owner}/${repo} type:issue in:body "${marker}" state:open`,
              per_page: 5,
            });

            if (existing.data.items.length > 0) {
              console.log(`Open issue already exists for ${marker}`);
              return;
            }

            const title = `[ops] Cloudflare Pages deployment check failed (${context.sha.slice(0, 7)})`;
            const body = [
              "Automated Cloudflare deployment check alert.",
              "",
              `- Commit: ${context.sha}`,
              `- Check run id: ${checkRunId}`,
              `- Conclusion: ${conclusion}`,
              `- Details URL: ${detailsUrl}`,
              `- Workflow run: https://github.com/${owner}/${repo}/actions/runs/${context.runId}`,
              "",
              marker,
            ].join("\n");

            await github.rest.issues.create({
              owner,
              repo,
              title,
              body,
            });
